services:
  synapse:
    image: matrixdotorg/synapse:v1.141.0
    user: ${SYNAPSE_E2E_UID:-1000}:${SYNAPSE_E2E_GID:-1000}
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_SERVER_NAME: localhost
    volumes:
      - ${SYNAPSE_E2E_DATA_DIR:-/tmp/synapse-admin-e2e}:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/_matrix/client/versions', timeout=5)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24

  synapse-admin:
    build:
      context: .
    depends_on:
      synapse:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./e2e/config.json:/app/config.json:ro
      - ./e2e/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/config.json >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
